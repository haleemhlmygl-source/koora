<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalZone — متابعة المباريات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #080c10; --bg2: #0d1117; --green: #00e676; --text: #e8edf5; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; text-align: center; }
        .live-banner { background: var(--bg2); border: 1px solid #30363d; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .live-tag { color: #ff1744; font-weight: bold; margin-bottom: 10px; display: block; }
        .match-info { display: flex; justify-content: space-around; align-items: center; }
        .team-name { font-weight: 700; font-size: 1.1rem; }
        .score { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--green); }
        .match-time { color: #8b949e; font-size: 0.9rem; margin-top: 10px; }
        #no-matches { padding: 20px; color: #8b949e; }
    </style>
</head>
<body>

    <h2>⚽ Goal<span>Zone</span></h2>

    <div id="matches-container">
        <div id="no-matches">جارِ سحب نتائج الدوري المصري الآن...</div>
    </div>

    <script>
        const apiKey = "3233c035c06b5a688ee984abb39f4b67";
        const leagueId = 233; // الدوري المصري

        async function getLiveMatches() {
            try {
                const response = await fetch(`https://v3.football.api-sports.io/fixtures?live=all&league=${leagueId}`, {
                    "method": "GET",
                    "headers": {
                        "x-rapidapi-host": "v3.football.api-sports.io",
                        "x-rapidapi-key": apiKey
                    }
                });
                const data = await response.json();
                const container = document.getElementById('matches-container');
                container.innerHTML = '';

                if (data.response && data.response.length > 0) {
                    data.response.forEach(match => {
                        container.innerHTML += `
                            <div class="live-banner">
                                <span class="live-tag">● مباشر الآن</span>
                                <div class="match-info">
                                    <div class="team-name">${match.teams.home.name}</div>
                                    <div class="score">${match.goals.home} - ${match.goals.away}</div>
                                    <div class="team-name">${match.teams.away.name}</div>
                                </div>
                                <div class="match-time">⏱ دقيقة: ${match.fixture.status.elapsed}'</div>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = '<div id="no-matches">لا توجد مباريات جارية حالياً في الدوري المصري.</div>';
                }
            } catch (error) {
                document.getElementById('no-matches').innerText = "حدث خطأ في الاتصال، تأكد من المفتاح.";
            }
        }

        getLiveMatches();
        setInterval(getLiveMatches, 60000); // تحديث كل دقيقة
    </script>
</body>
</html>
