<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalZone 2026 Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #12151a; --green: #00e676; --text: #f0f0f0; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; }
        .header { text-align: center; padding: 15px; color: var(--green); font-weight: 900; font-size: 1.8rem; border-bottom: 2px solid #1c2128; }
        .status-bar { font-size: 0.75rem; color: #8b949e; text-align: center; margin: 10px 0; }
        .section-title { background: var(--card); padding: 10px; border-radius: 8px; margin: 20px 0 10px; border-right: 5px solid var(--green); font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        td, th { padding: 12px 8px; text-align: center; border-bottom: 1px solid #1c2128; }
        .team-info { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .team-logo { width: 28px; height: 28px; background: #fff; border-radius: 50%; padding: 2px; }
    </style>
</head>
<body>

    <div class="header">⚽ GOALZONE 2026</div>
    <div class="status-bar">تحديث حي: الأربعاء 18 مارس 2026</div>

    <div class="section-title">🇪🇬 ترتيب الدوري المصري 2026</div>
    <div id="egypt-table">جارِ فحص أحدث البيانات...</div>

    <div class="section-title">🇸🇦 ترتيب الدوري السعودي 2026</div>
    <div id="saudi-table">جارِ فحص أحدث البيانات...</div>

    <script>
        const apiKey = "3233c035c06b5a688ee984abb39f4b67";

        async function getFreshData(leagueId, elementId) {
            try {
                // بنطلب موسم 2025 اللي هو الحالي في مارس 2026
                const res = await fetch(`https://v3.football.api-sports.io/standings?league=${leagueId}&season=2025`, {
                    "headers": { "x-rapidapi-key": apiKey, "x-rapidapi-host": "v3.football.api-sports.io" }
                });
                const data = await res.json();
                
                if (data.response && data.response[0]) {
                    const standings = data.response[0].league.standings[0];
                    let html = '<table><tr><th>#</th><th style="text-align:right;">الفريق</th><th>نقاط</th></tr>';
                    standings.slice(0, 10).forEach(team => {
                        html += `<tr>
                            <td style="color:#00e676;">${team.rank}</td>
                            <td>
                                <div class="team-info">
                                    <img class="team-logo" src="${team.team.logo}">
                                    <span>${team.team.name}</span>
                                </div>
                            </td>
                            <td style="font-weight:bold;">${team.points}</td>
                        </tr>`;
                    });
                    html += '</table>';
                    document.getElementById(elementId).innerHTML = html;
                } else {
                    document.getElementById(elementId).innerHTML = "المصدر لسه بيحدث جدول 2026.. جرب تفتح المباشر بكرة!";
                }
            } catch (e) { document.getElementById(elementId).innerHTML = "خطأ في الشبكة."; }
        }

        getFreshData(233, 'egypt-table');
        getFreshData(307, 'saudi-table');
    </script>
</body>
</html>
