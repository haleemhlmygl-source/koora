<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalZone 2026 - HALEEM HLMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #12151a; --green: #00e676; --gold: #ffd700; --red: #ff4d4d; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; }
        .header { text-align: center; color: var(--green); font-size: 1.6rem; padding: 10px; font-weight: 900; }
        .tabs-container { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 15px; }
        .tab-btn { background: var(--card); border: 1px solid #333; color: #aaa; padding: 8px 15px; border-radius: 20px; white-space: nowrap; cursor: pointer; }
        .tab-btn.active { background: var(--green); color: #000; font-weight: bold; }
        .box { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #333; min-height: 100px; margin-bottom: 15px; }
        table { width: 100%; text-align: center; border-collapse: collapse; }
        th { color: var(--green); padding-bottom: 10px; border-bottom: 1px solid #333; }
        td { padding: 10px 5px; border-bottom: 1px solid #222; }
        .footer { text-align: center; color: #555; font-size: 0.7rem; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">⚽ GOALZONE 2026</div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="loadData(39, 'الإنجليزي', this)">🏴󠁧󠁢󠁥󠁮󠁧󠁿 الإنجليزي</button>
        <button class="tab-btn" onclick="loadData(307, 'السعودي', this)">🇸🇦 السعودي</button>
        <button class="tab-btn" onclick="loadData(140, 'الإسباني', this)">🇪🇸 الإسباني</button>
        <button class="tab-btn" onclick="loadData(233, 'المصري', this)">🇪🇬 المصري</button>
    </div>

    <div class="box" id="content">
        <p style="text-align:center; color:var(--gold);">جاري جلب البيانات الحقيقية... 🔄</p>
    </div>

    <div class="footer">المبرمج: HALEEM HLMY</div>

    <script>
        // تأكد أن هذا المفتاح صحيح تماماً من لوحة تحكم API-Football
        const MY_KEY = "3233c035c06b5a688ee984abb39f4b67"; 

        async function loadData(leagueId, name, btn) {
            if(btn) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            const box = document.getElementById('content');
            box.innerHTML = `<p style="text-align:center;">جاري تحميل ${name}... 🔄</p>`;

            try {
                // جربنا 2025 لأنها الأكثر استقراراً حالياً في السيرفر للدوريات الجارية
                const response = await fetch(`https://v3.football.api-sports.io/standings?league=${leagueId}&season=2025`, {
                    "method": "GET",
                    "headers": {
                        "x-rapidapi-key": MY_KEY,
                        "x-rapidapi-host": "v3.football.api-sports.io"
                    }
                });

                const data = await response.json();

                if (data.response && data.response.length > 0) {
                    const standings = data.response[0].league.standings[0];
                    let html = '<table><tr><th>#</th><th>الفريق</th><th>ن</th></tr>';
                    standings.slice(0, 10).forEach(team => {
                        html += `<tr>
                            <td>${team.rank}</td>
                            <td style="text-align:right;"><img src="${team.team.logo}" width="20"> ${team.team.name}</td>
                            <td><b>${team.points}</b></td>
                        </tr>`;
                    });
                    box.innerHTML = html + '</table>';
                } else {
                    box.innerHTML = `<p style="text-align:center;">السيرفر مفيش فيه بيانات حالياً للدوري ${name}. جرب دوري تاني.</p>`;
                }
            } catch (error) {
                box.innerHTML = `<p style="text-align:center; color:red;">خطأ في الاتصال. تأكد من مفتاح API.</p>`;
            }
        }

        // تشغيل الدوري الإنجليزي فوراً عند الفتح
        window.onload = () => loadData(39, 'الإنجليزي', null);
    </script>
</body>
</html>
