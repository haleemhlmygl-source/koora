<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalZone - HALEEM HLMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #12151a; --green: #00e676; --gold: #ffd700; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; }
        .header { text-align: center; color: var(--green); font-size: 1.6rem; padding: 15px 0; font-weight: 900; }
        .ads-mini { background: var(--card); border: 1px solid #2d333b; border-radius: 12px; margin: 10px auto; padding: 8px; max-width: 350px; max-height: 150px; overflow: hidden; text-align: center; }
        .section-title { background: var(--card); padding: 10px; border-radius: 8px; margin: 15px 0 10px; border-right: 5px solid var(--green); font-weight: bold; }
        .table-container { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #2d333b; min-height: 100px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #1c2128; color: var(--green); padding: 10px 5px; }
        td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #1c2128; }
        .team-cell { text-align: right; display: flex; align-items: center; gap: 8px; }
        .btn-whatsapp { display: block; background: #25d366; color: #fff; text-align: center; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: bold; margin: 20px 0; }
        .footer { text-align: center; color: #8b949e; font-size: 0.75rem; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">⚽ GOALZONE 2026</div>

    <div class="ads-mini">
        <script async="async" data-cfasync="false" src="https://pl28941775.profitablecpmratenetwork.com/f60b54d7922d62b97dde9065b726be7e/invoke.js"></script>
        <div id="container-f60b54d7922d62b97dde9065b726be7e"></div>
    </div>

    <div class="section-title">🇪🇬 ترتيب الدوري المصري (بث مباشر)</div>
    <div class="table-container" id="egy-table">
        <p style="text-align:center; padding:20px;">جارِ سحب الترتيب الحقيقي من السيرفر...</p>
    </div>

    <a href="https://api.whatsapp.com/send?text=شاهد ترتيب الدوري المصري الحقيقي على موقع HALEEM HLMY: https://haleemhlmygl-source.github.io/koora/" class="btn-whatsapp">📤 انشر الموقع واكسب</a>

    <div class="footer">
        بواسطة المبرمج HALEEM HLMY <br>
        زيارات الموقع: <span style="color:var(--green);" id="count">1,765</span>
    </div>

    <script>
        let c = 1765; setInterval(() => { c += 1; document.getElementById('count').innerText = c; }, 6000);

        async function loadData() {
            try {
                // محاولة الربط بمفتاح جديد ونظيف
                const res = await fetch(`https://v3.football.api-sports.io/standings?league=233&season=2025`, {
                    "headers": { 
                        "x-rapidapi-key": "3233c035c06b5a688ee984abb39f4b67", 
                        "x-rapidapi-host": "v3.football.api-sports.io" 
                    }
                });
                const data = await res.json();
                
                if (data.response && data.response[0]) {
                    const st = data.response[0].league.standings[0];
                    let html = '<table><thead><tr><th>#</th><th style="text-align:right;">الفريق</th><th>ن</th></tr></thead><tbody>';
                    
                    st.slice(0, 10).forEach(t => {
                        html += `<tr>
                            <td>${t.rank}</td>
                            <td><div class="team-cell"><img src="${t.team.logo}" width="20">${t.team.name}</div></td>
                            <td style="color:var(--green); font-weight:bold;">${t.points}</td>
                        </tr>`;
                    });
                    
                    html += '</tbody></table>';
                    document.getElementById('egy-table').innerHTML = html;
                } else {
                    document.getElementById('egy-table').innerHTML = '<p style="text-align:center; padding:20px; color:var(--gold);">السيرفر المجاني استهلك طاقته لليوم. التحديث الحقيقي سيعود خلال ساعات!</p>';
                }
            } catch (e) { 
                document.getElementById('egy-table').innerHTML = '<p style="text-align:center; padding:20px;">خطأ في الاتصال بالسيرفر.</p>'; 
            }
        }
        loadData();
    </script>
</body>
</html>
