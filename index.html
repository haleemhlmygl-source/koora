<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalZone 2026 - HALEEM HLMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #12151a; --green: #00e676; --gold: #ffd700; --red: #ff4d4d; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        .news-ticker { background: var(--red); color: #fff; padding: 8px 0; font-size: 0.85rem; overflow: hidden; white-space: nowrap; border-radius: 10px; margin-bottom: 15px; }
        .news-ticker span { display: inline-block; animation: ticker 30s linear infinite; font-weight: bold; padding-right: 100vw; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .header { text-align: center; color: var(--green); font-size: 1.8rem; font-weight: 900; padding: 10px 0; text-shadow: 0 0 10px rgba(0,230,118,0.3); }
        .section-title { background: var(--card); padding: 12px; border-radius: 10px; margin: 20px 0 10px; border-right: 6px solid var(--green); font-weight: 800; font-size: 1rem; color: var(--green); }
        .live-scroll { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .live-scroll::-webkit-scrollbar { display: none; }
        .live-card { background: #1c1f26; min-width: 155px; max-width: 155px; padding: 12px 10px; border-radius: 12px; border: 1px solid #2a2a2a; text-align: center; flex-shrink: 0; }
        .live-card.is-live { border-color: rgba(255,77,77,0.6); }
        .badge { font-size: 0.68rem; padding: 2px 8px; border-radius: 4px; display: inline-block; font-weight: bold; }
        .badge-live { background: var(--red); animation: blink 1s infinite; }
        .badge-fin  { background: #2a2a2a; color: #aaa; }
        .badge-ns   { background: #0d2b1a; color: var(--green); }
        .live-score { font-size: 1.3rem; font-weight: 900; color: var(--gold); margin: 6px 0; }
        .team-sm { font-size: 0.72rem; margin: 4px 0; line-height: 1.4; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .team-sm img { width: 18px; height: 18px; object-fit: contain; }
        .league-sm { font-size: 0.62rem; color: #555; margin-top: 6px; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .tabs { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 15px; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { background: var(--card); border: 1px solid #444; color: #bbb; padding: 10px 16px; border-radius: 20px; white-space: nowrap; cursor: pointer; font-weight: bold; font-size: 0.82rem; font-family: 'Cairo', sans-serif; transition: all 0.2s; }
        .tab-btn.active { background: var(--green); color: #000; border-color: var(--green); }
        .box { background: var(--card); border-radius: 15px; padding: 12px; border: 1px solid #222; margin-bottom: 15px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.82rem; min-width: 320px; }
        th { color: var(--green); padding: 10px 4px; border-bottom: 2px solid #2a2a2a; font-size: 0.75rem; }
        td { padding: 9px 4px; border-bottom: 1px solid #1a1a1a; text-align: center; }
        tr:last-child td { border-bottom: none; }
        .team-cell { text-align: right; display: flex; align-items: center; gap: 7px; }
        .team-cell img { width: 22px; height: 22px; object-fit: contain; flex-shrink: 0; }
        .r1 { color: var(--gold); font-weight: 900; }
        .r2 { color: var(--green); font-weight: 700; }
        .rrel { color: var(--red); }
        .pts { font-weight: 900; color: var(--green); font-size: 0.95rem; }
        .msg { text-align: center; padding: 28px; color: #888; font-size: 0.88rem; line-height: 2; }
        .spin { display: inline-block; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .retry-btn { margin-top: 12px; padding: 9px 22px; background: var(--green); border: none; border-radius: 20px; color: #000; font-family: 'Cairo', sans-serif; font-size: 0.88rem; font-weight: 700; cursor: pointer; display: inline-block; }
        .upd { font-size: 0.7rem; color: #444; text-align: center; margin-top: 6px; }
        .upd b { color: #666; }
        .footer { text-align: center; color: #555; font-size: 0.78rem; padding: 20px 0; border-top: 1px solid #1a1a1a; line-height: 1.8; margin-top: 10px; }
    </style>
</head>
<body>

<div class="news-ticker">
    <span id="ticker-text">📢 GoalZone 2026 — نتائج ومباريات حقيقية مباشرة .. برعاية المبرمج حليم حلمي 🌟</span>
</div>

<div class="header">⚽ GOALZONE 2026</div>

<div class="section-title">⏱️ مباريات اليوم</div>
<div class="live-scroll" id="live-box">
    <div class="msg"><span class="spin">⚽</span> جاري تحميل مباريات اليوم...</div>
</div>
<div class="upd" id="live-upd"></div>

<div class="section-title" style="margin-top:25px;">📊 ترتيب الدوريات</div>
<div class="tabs">
    <button class="tab-btn active" onclick="loadStandings(148,'الإنجليزي',this)">🏴󠁧󠁢󠁥󠁮󠁧󠁿 الإنجليزي</button>
    <button class="tab-btn" onclick="loadStandings(302,'الإسباني',this)">🇪🇸 الإسباني</button>
    <button class="tab-btn" onclick="loadStandings(207,'الإيطالي',this)">🇮🇹 الإيطالي</button>
    <button class="tab-btn" onclick="loadStandings(175,'الألماني',this)">🇩🇪 الألماني</button>
    <button class="tab-btn" onclick="loadStandings(168,'الفرنسي',this)">🇫🇷 الفرنسي</button>
    <button class="tab-btn" onclick="loadStandings(152,'السعودي',this)">🇸🇦 السعودي</button>
    <button class="tab-btn" onclick="loadStandings(4,'المصري',this)">🇪🇬 المصري</button>
</div>
<div class="box" id="stand-box">
    <div class="msg"><span class="spin">⚽</span> جاري تحميل الترتيب...</div>
</div>
<div class="upd" id="stand-upd"></div>

<div class="footer">
    بواسطة المبرمج: <b>HALEEM HLMY</b><br>
    مكان الإصدار: الحرافشة - سوهاج | مارس 2026<br>
    جميع الحقوق محفوظة ©
</div>

<script>
var KEY  = "9e7c30671e26d0e0b3c2fba28f7cf9db7a23af5d521c9e6d06f1e0e1e45aef21";
var BASE = "https://apiv2.allsportsapi.com/football/";

function nowTime() {
    return new Date().toLocaleTimeString("ar-EG", { hour: "2-digit", minute: "2-digit" });
}
function mkLogo(url) {
    if (!url) return "";
    return '<img src="' + url + '" onerror="this.style.display=\'none\'" alt="">';
}

function loadToday() {
    var box = document.getElementById("live-box");
    box.innerHTML = '<div class="msg"><span class="spin">⚽</span> جاري تحميل مباريات اليوم...</div>';
    var today = new Date().toISOString().split("T")[0];
    var url = BASE + "?met=Fixtures&APIkey=" + KEY + "&from=" + today + "&to=" + today;
    fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data) {
        var matches = data.result || [];
        if (!matches.length) { box.innerHTML = '<div class="msg">📅 لا توجد مباريات اليوم</div>'; return; }
        matches.sort(function(a,b){
            var o = {"inprogress":0,"1H":0,"2H":0,"HT":0,"Finished":1,"Finished_AET":1};
            var oa = o[a.event_status]!==undefined ? o[a.event_status] : 2;
            var ob = o[b.event_status]!==undefined ? o[b.event_status] : 2;
            return oa - ob;
        });
        var html = "", tickers = [];
        for (var i=0; i<matches.length; i++) {
            var m = matches[i];
            var st = m.event_status || "";
            var isL = ["inprogress","1H","2H","HT"].indexOf(st) > -1;
            var isF = st.indexOf("Finished") > -1;
            var sH = m.event_home_final_score, sA = m.event_away_final_score;
            var hasS = sH !== null && sH !== "" && sH !== undefined;
            var home = m.event_home_team || "", away = m.event_away_team || "";
            var badge = isL ? '<span class="badge badge-live">🔴 مباشر</span>'
                : isF ? '<span class="badge badge-fin">انتهت ✓</span>'
                : '<span class="badge badge-ns">⏰ ' + (m.event_time||"") + '</span>';
            var score = hasS ? '<div class="live-score">'+sH+' - '+sA+'</div>'
                : '<div class="live-score" style="color:#444;font-size:1rem;">vs</div>';
            html += '<div class="live-card'+(isL?" is-live":"")+'">'
                +badge
                +'<div class="team-sm" style="margin-top:8px;">'+mkLogo(m.home_team_logo)+home+'</div>'
                +score
                +'<div class="team-sm">'+mkLogo(m.away_team_logo)+away+'</div>'
                +'<div class="league-sm">'+(m.league_name||"")+'</div>'
                +'</div>';
            if (hasS) tickers.push("⚽ "+home+" "+sH+" - "+sA+" "+away);
        }
        box.innerHTML = html;
        document.getElementById("live-upd").innerHTML = "آخر تحديث: <b>"+nowTime()+"</b>";
        if (tickers.length) document.getElementById("ticker-text").textContent = tickers.join("   •   ")+"   •   GoalZone 2026 🌟";
    })
    .catch(function(){ box.innerHTML = '<div class="msg">⚠️ تعذّر التحميل<br><button class="retry-btn" onclick="loadToday()">🔄 إعادة المحاولة</button></div>'; });
}

function loadStandings(id, name, btn) {
    if (btn) { document.querySelectorAll(".tab-btn").forEach(function(b){b.classList.remove("active");}); btn.classList.add("active"); }
    var box = document.getElementById("stand-box");
    box.innerHTML = '<div class="msg"><span class="spin">⚽</span> جاري تحميل ترتيب '+name+'...</div>';
    fetch(BASE+"?met=Standings&leagueId="+id+"&APIkey="+KEY)
    .then(function(r){ return r.json(); })
    .then(function(data) {
        var table = null;
        if (data.result && data.result.length > 0) {
            table = data.result[0].league_table || data.result;
        }
        if (!table || !table.length) throw new Error("لا توجد بيانات");
        var total = table.length;
        var html = '<table><tr><th>#</th><th style="text-align:right;">الفريق</th><th>ل</th><th>ف</th><th>ت</th><th>خ</th><th>ن</th></tr>';
        for (var i=0; i<table.length; i++) {
            var row = table[i];
            var rank = parseInt(row.standing_place || row.league_rank || (i+1));
            var rc = rank===1?"r1":rank<=3?"r2":rank>=total-2?"rrel":"";
            var tname = row.standing_team || row.league_team || "";
            var logo  = row.standing_teamLogo || row.home_team_logo || "";
            html += '<tr>'
                +'<td class="'+rc+'"><b>'+rank+'</b></td>'
                +'<td><div class="team-cell">'+mkLogo(logo)+tname+'</div></td>'
                +'<td>'+(row.standing_PG||0)+'</td>'
                +'<td>'+(row.standing_W||0)+'</td>'
                +'<td>'+(row.standing_D||0)+'</td>'
                +'<td>'+(row.standing_L||0)+'</td>'
                +'<td class="pts">'+(row.standing_PTS||0)+'</td>'
                +'</tr>';
        }
        box.innerHTML = html+'</table>';
        document.getElementById("stand-upd").innerHTML = "آخر تحديث: <b>"+nowTime()+"</b>";
    })
    .catch(function(){ box.innerHTML = '<div class="msg">⚠️ تعذّر تحميل ترتيب '+name+'<br><button class="retry-btn" onclick="loadStandings('+id+',\''+name+'\',null)">🔄 إعادة المحاولة</button></div>'; });
}

window.onload = function() {
    loadToday();
    loadStandings(148, "الإنجليزي", null);
    setInterval(loadToday, 60000);
};
</script>
</body>
</html>
