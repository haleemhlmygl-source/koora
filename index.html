<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalZone 2026 - HALEEM HLMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #12151a; --green: #00e676; --gold: #ffd700; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 15px; }
        .header { text-align: center; color: var(--green); font-size: 1.8rem; font-weight: 900; margin-bottom: 20px; }
        .box { background: var(--card); border-radius: 15px; padding: 15px; border: 1px solid #333; min-height: 200px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { color: var(--green); border-bottom: 2px solid #333; padding: 10px; }
        td { padding: 12px 5px; border-bottom: 1px solid #222; text-align: center; }
        .footer { text-align: center; color: #666; font-size: 0.75rem; margin-top: 30px; border-top: 1px solid #222; padding: 10px; }
        .btn-wrap { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; }
        button { background: #1c1f26; color: white; border: 1px solid #444; padding: 8px 15px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">⚽ GOALZONE 2026</div>
    
    <div class="btn-wrap">
        <button onclick="getStanding('PL')">🏴󠁧󠁢󠁥󠁮󠁧󠁿 إنجلترا</button>
        <button onclick="getStanding('PD')">🇪🇸 إسبانيا</button>
    </div>

    <div class="box" id="standings">
        <p style="text-align:center;">اضغط على الدوري لجلب بيانات 2026... 🔄</p>
    </div>

    <div class="footer">المبرمج: <b>HALEEM HLMY</b> | سوهاج 2026</div>

    <script>
        const TOKEN = "2388962a5e2454c87c909d662a32188";

        async function getStanding(league) {
            const box = document.getElementById('standings');
            box.innerHTML = "<p style='text-align:center;'>جاري سحب البيانات المباشرة... 🔄</p>";
            
            try {
                // استخدام وسيط آخر أسرع
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://api.football-data.org/v4/competitions/${league}/standings`)}`);
                const json = await res.json();
                const data = JSON.parse(json.contents);
                
                if (data.standings && data.standings[0]) {
                    const table = data.standings[0].table;
                    let html = '<table><tr><th>#</th><th>الفريق</th><th>ل</th><th>ن</th></tr>';
                    table.slice(0, 10).forEach(team => {
                        html += `<tr><td>${team.position}</td><td style="text-align:right;">${team.team.shortName}</td><td>${team.playedGames}</td><td><b>${team.points}</b></td></tr>`;
                    });
                    box.innerHTML = html + '</table>';
                }
            } catch (e) {
                box.innerHTML = "<p style='text-align:center;'>السيرفر مزدحم حالياً.. جرب تضغط تاني كمان دقيقة.</p>";
            }
        }
        // ابدأ بالإنجليزي تلقائياً
        getStanding('PL');
    </script>
</body>
</html>
