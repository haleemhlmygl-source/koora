<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalZone - HALEEM HLMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #12151a; --green: #00e676; --gold: #ffd700; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; }
        .header { text-align: center; color: var(--green); font-size: 1.6rem; padding: 15px 0; font-weight: 900; }
        
        /* شريط الأخبار المتحرك */
        .news-ticker { background: #ff4d4d; color: #fff; padding: 5px; font-size: 0.8rem; overflow: hidden; white-space: nowrap; border-radius: 5px; margin-bottom: 10px; }
        .news-ticker span { display: inline-block; padding-left: 100%; animation: ticker 15s linear infinite; }
        @keyframes ticker { 0% { transform: translate(0, 0); } 100% { transform: translate(100%, 0); } }

        .ads-mini { background: var(--card); border: 1px solid #2d333b; border-radius: 12px; margin: 10px auto; padding: 8px; max-width: 350px; max-height: 150px; overflow: hidden; text-align: center; }
        .section-title { background: var(--card); padding: 10px; border-radius: 8px; margin: 10px 0; border-right: 5px solid var(--green); font-weight: bold; }
        .table-container { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #2d333b; min-height: 120px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #1c2128; color: var(--green); padding: 10px 5px; }
        td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #1c2128; }
        
        .live-dot { height: 10px; width: 10px; background-color: #ff0000; border-radius: 50%; display: inline-block; margin-left: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .btn-whatsapp { display: block; background: #25d366; color: #fff; text-align: center; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: bold; margin: 20px 0; }
        .footer { text-align: center; color: #8b949e; font-size: 0.75rem; margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="news-ticker">
        <span>🔥 عاجل: الأهلي يستعد للمباراة القادمة بقوة.. الزمالك يواصل تدريباته.. الدوري المصري يشتعل! 🔥</span>
    </div>

    <div class="header">⚽ GOALZONE 2026</div>

    <div class="ads-mini">
        <script async="async" data-cfasync="false" src="https://pl28941775.profitablecpmratenetwork.com/f60b54d7922d62b97dde9065b726be7e/invoke.js"></script>
        <div id="container-f60b54d7922d62b97dde9065b726be7e"></div>
    </div>

    <div class="section-title">🇪🇬 ترتيب الدوري (بث حي <span class="live-dot"></span>)</div>
    <div class="table-container" id="egy-table">
        <p style="text-align:center; padding:20px; color:var(--gold);">جاري الاتصال بسيرفر النتائج الحية...</p>
    </div>

    <a href="https://api.whatsapp.com/send?text=ادخل شوف ترتيب الدوري المصري المباشر على موقع المبرمج HALEEM HLMY: https://haleemhlmygl-source.github.io/koora/" class="btn-whatsapp">📤 شارك الرابط وابدأ الربح</a>

    <div class="footer">
        جميع الحقوق محفوظة للمبرمج HALEEM HLMY <br>
        زيارات الموقع الآن: <span style="color:var(--green); font-weight:bold;" id="count">1,780</span>
    </div>

    <script>
        let c = 1780; setInterval(() => { c += Math.floor(Math.random()*3); document.getElementById('count').innerText = c; }, 5000);

        async function loadData() {
            try {
                const res = await fetch(`https://v3.football.api-sports.io/standings?league=233&season=2025`, {
                    "headers": { "x-rapidapi-key": "3233c035c06b5a688ee984abb39f4b67", "x-rapidapi-host": "v3.football.api-sports.io" }
                });
                const data = await res.json();
                if (data.response && data.response[0]) {
                    const st = data.response[0].league.standings[0];
                    let html = '<table><tr><th>#</th><th style="text-align:right;">الفريق</th><th>ن</th></tr>';
                    st.slice(0, 10).forEach(t => {
                        html += `<tr><td>${t.rank}</td><td style="text-align:right;"><img src="${t.team.logo}" width="18" style="vertical-align:middle; margin-left:5px;">${t.team.name}</td><td>${t.points}</td></tr>`;
                    });
                    html += '</table>';
                    document.getElementById('egy-table').innerHTML = html;
                } else {
                    document.getElementById('egy-table').innerHTML = '<p style="text-align:center; padding:20px; color:var(--gold);">السيرفر في استراحة.. سيعود التحديث المباشر خلال لحظات!</p>';
                }
            } catch (e) { document.getElementById('egy-table').innerHTML = "فشل الاتصال بالبيانات."; }
        }
        loadData();
    </script>
</body>
</html>
