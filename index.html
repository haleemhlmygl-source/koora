<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="monetag" content="92e56f384e0b171e578bd23c116943b4">

    <title>GoalZone 2026 - HALEEM HLMY</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/532/532495.png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root{--bg:#05070a;--bg2:#0d1117;--card:#12151a;--card2:#1a1f28;--green:#00e676;--gold:#ffd700;--live:#ff3d00;--border:#1e2530;--text:#e8eaf0;--text2:#8892a4;--glow:rgba(0,230,118,0.15)}
        [data-theme="light"]{--bg:#f0f4f8;--bg2:#e4eaf2;--card:#fff;--card2:#f7f9fc;--border:#d0dae8;--text:#1a2233;--text2:#5a6a82}
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh}
        .alert-bar{background:linear-gradient(90deg,var(--live),#ff6d00);color:#fff;text-align:center;font-size:.78rem;padding:9px 0;font-weight:900}
        .header-area{padding:24px 16px 16px;text-align:center;background:var(--bg2);border-bottom:1px solid var(--border)}
        .logo-box{display:inline-block;padding:12px 30px;border:2px solid var(--green);border-radius:16px;box-shadow:0 0 30px var(--glow)}
        .logo-main{color:var(--green);font-size:2rem;font-weight:900;font-family:'Orbitron',sans-serif;letter-spacing:2px;text-shadow:0 0 20px var(--green)}
        .logo-sub{color:var(--gold);font-size:.72rem;font-weight:700;display:block;border-top:1px solid var(--border);padding-top:5px;margin-top:5px}
        .tabs-wrap{max-width:640px;margin:14px auto 0;padding:0 16px}
        .tabs{display:flex;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;padding:4px;gap:2px}
        .tab-btn{flex:1;padding:10px 4px;background:transparent;border:none;color:var(--text2);cursor:pointer;font-family:'Cairo',sans-serif;font-size:.78rem;font-weight:700;border-radius:10px}
        .tab-btn.active{background:var(--green);color:#000}
        .content{padding:16px;max-width:640px;margin:auto}
        .tab-page{display:none}
        .tab-page.active{display:block}
        .league-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--card2);border-radius:12px 12px 0 0;border:1px solid var(--border);font-weight:900;font-size:.85rem;margin-top:10px}
        .match-card{background:var(--card);border:1px solid var(--border);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
        .match-time{color:var(--green);font-weight:900;background:rgba(0,230,118,.1);padding:4px 12px;border-radius:8px;font-size:.82rem}
        .footer{text-align:center;color:var(--text2);padding:28px 16px;font-size:.78rem;border-top:1px solid var(--border);margin-top:20px}
    </style>
</head>
<body>

<div class="alert-bar">📢 مباشر الان: تابعوا تغطية مباريات اليوم والنتائج لحظة بلحظة</div>

<div class="header-area">
    <div class="logo-box">
        <span class="logo-main">GOALZONE 2026</span>
        <span class="logo-sub">DEVELOPED BY HALEEM HLMY</span>
    </div>
</div>

<div class="tabs-wrap">
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('matches',this)">🏟️ المباريات</button>
        <button class="tab-btn" onclick="showTab('standings',this)">📊 الترتيب</button>
    </div>
</div>

<div class="content">
    <div class="tab-page active" id="tab-matches">
        <div id="matches-container"></div>
    </div>
    <div class="tab-page" id="tab-standings">
        <div id="standingsContainer">
            <p style="text-align:center; padding:20px; color:var(--text2)">جاري تحميل الترتيب...</p>
        </div>
    </div>
</div>

<div class="footer">تطوير وبرمجة: <b style="color:var(--green)">HALEEM HLMY</b> | سوهاج 2026 &copy;</div>

<script>
const MATCHES = [
    { league:"Premier League", flag:"🏴", games:[{home:"Brighton", away:"Liverpool", time:"15:30"}, {home:"Chelsea", away:"Everton", time:"20:30"}] },
    { league:"CAF Champions League", flag:"🌍", games:[{home:"Al Ahly", away:"Esperance", time:"22:00"}] }
];

function renderMatches() {
    const c = document.getElementById('matches-container');
    let html = '';
    MATCHES.forEach(lg => {
        html += `<div class="league-header">${lg.flag} ${lg.league}</div>`;
        lg.games.forEach(g => {
            html += `<div class="match-card"><span>${g.home} vs ${g.away}</span><span class="match-time">${g.time}</span></div>`;
        });
    });
    c.innerHTML = html;
}

function showTab(name, el) {
    document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    el.classList.add('active');
}

window.onload = renderMatches;
</script>

</body>
</html>
