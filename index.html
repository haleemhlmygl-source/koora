<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="monetag" content="3270879">

    <title>GoalZone 2026 - HALEEM HLMY</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/532/532495.png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root{--bg:#05070a;--bg2:#0d1117;--card:#12151a;--card2:#1a1f28;--green:#00e676;--gold:#ffd700;--live:#ff3d00;--border:#1e2530;--text:#e8eaf0;--text2:#8892a4;--glow:rgba(0,230,118,0.15)}
        [data-theme="light"]{--bg:#f0f4f8;--bg2:#e4eaf2;--card:#fff;--card2:#f7f9fc;--border:#d0dae8;--text:#1a2233;--text2:#5a6a82}
        *{box-sizing:border-box;margin:0;padding:0;transition:background .3s,color .3s}
        body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;overflow-x:hidden}
        .alert-bar{background:linear-gradient(90deg,var(--live),#ff6d00);color:#fff;text-align:center;font-size:.78rem;padding:9px 0;font-weight:900}
        .header-area{padding:24px 16px 16px;text-align:center;background:var(--bg2);border-bottom:1px solid var(--border)}
        .header-top{display:flex;justify-content:flex-end;max-width:640px;margin:0 auto 16px;gap:10px}
        .theme-btn{background:var(--card);border:1px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
        .notif-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:0 14px;height:38px;border-radius:20px;cursor:pointer;font-size:.78rem;font-weight:900;font-family:'Cairo',sans-serif;display:flex;align-items:center;gap:6px}
        .notif-btn.active{background:var(--green);color:#000;border-color:var(--green)}
        .logo-box{display:inline-block;padding:12px 30px;border:2px solid var(--green);border-radius:16px;box-shadow:0 0 30px var(--glow)}
        .logo-main{color:var(--green);font-size:2rem;font-weight:900;font-family:'Orbitron',sans-serif;letter-spacing:2px;text-shadow:0 0 20px var(--green)}
        .logo-sub{color:var(--gold);font-size:.72rem;font-weight:700;display:block;border-top:1px solid var(--border);padding-top:5px;margin-top:5px}
        .ticker-wrap{background:var(--bg2);border-bottom:1px solid var(--border);height:38px;overflow:hidden;display:flex;align-items:center}
        .ticker-label{background:var(--green);color:#000;padding:0 14px;font-weight:900;font-size:.75rem;height:100%;display:flex;align-items:center;flex-shrink:0}
        .ticker-track{overflow:hidden;flex:1}
        .ticker-text{white-space:nowrap;animation:ticker 40s linear infinite;font-size:.8rem;color:var(--text2)}
        @keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(100%)}}
        .tabs-wrap{max-width:640px;margin:14px auto 0;padding:0 16px}
        .tabs{display:flex;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;padding:4px;gap:2px}
        .tab-btn{flex:1;padding:10px 4px;background:transparent;border:none;color:var(--text2);cursor:pointer;font-family:'Cairo',sans-serif;font-size:.78rem;font-weight:700;border-radius:10px;transition:all .2s;white-space:nowrap}
        .tab-btn.active{background:var(--green);color:#000}
        .content{padding:16px;max-width:640px;margin:auto}
        .tab-page{display:none}
        .tab-page.active{display:block}
        .section-title{color:var(--gold);font-size:1rem;margin:20px 0 10px;border-right:4px solid var(--green);padding-right:10px;font-weight:900}
        .league-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--card2);border-radius:12px 12px 0 0;border:1px solid var(--border);font-weight:900;font-size:.85rem;margin-top:10px}
        .match-card{background:var(--card);border:1px solid var(--border);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
        .match-teams{font-size:.88rem;font-weight:700}
        .match-time{color:var(--green);font-weight:900;background:rgba(0,230,118,.1);padding:4px 12px;border-radius:8px;font-size:.82rem}
        .standings-table{width:100%;border-collapse:collapse;font-size:.82rem;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
        .standings-table th{background:var(--card2);padding:10px;color:var(--text2)}
        .standings-table td{padding:10px;text-align:center;border-bottom:1px solid var(--border)}
        .footer{text-align:center;color:var(--text2);padding:28px 16px;font-size:.78rem;border-top:1px solid var(--border);margin-top:20px}
    </style>
</head>
<body>

<div class="alert-bar">📢 مباشر الان: تابعوا تغطية مباريات اليوم والنتائج لحظة بلحظة</div>

<div class="header-area">
    <div class="header-top">
        <button class="notif-btn">🔔 الاشعارات</button>
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
    </div>
    <div class="logo-box">
        <span class="logo-main">GOALZONE 2026</span>
        <span class="logo-sub">DEVELOPED BY HALEEM HLMY</span>
    </div>
</div>

<div class="ticker-wrap">
    <div class="ticker-label">عاجل</div>
    <div class="ticker-track"><div class="ticker-text">⚽ اهلا بكم في GoalZone 2026 .. تابعوا النتائج المباشرة .. Premier League .. La Liga .. 🏆 Champions League</div></div>
</div>

<div class="tabs-wrap">
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('matches',this)">🏟️ المباريات</button>
        <button class="tab-btn" onclick="showTab('standings',this)">📊 الترتيب</button>
    </div>
</div>

<div class="content">
    <div class="tab-page active" id="tab-matches">
        <div class="section-title">📅 مواجهات اليوم</div>
        <div id="matches-container"></div>
    </div>

    <div class="tab-page" id="tab-standings">
        <div class="section-title">📊 ترتيب الدوري الإنجليزي</div>
        <div id="standingsContainer"></div>
    </div>
</div>

<div class="footer">تطوير وبرمجة: <b style="color:var(--green)">HALEEM HLMY</b> | سوهاج 2026 &copy;</div>

<script>
const MATCHES = [
    { league:"Premier League", flag:"🏴", games:[{home:"Brighton", away:"Liverpool", time:"15:30"}, {home:"Chelsea", away:"Everton", time:"20:30"}] },
    { league:"CAF Champions League", flag:"🌍", games:[{home:"Al Ahly", away:"Esperance", time:"22:00"}] }
];

function renderMatches() {
    const c = document.getElementById('matches-container');
    let html = '';
    MATCHES.forEach(lg => {
        html += `<div class="league-header">${lg.flag} ${lg.league}</div>`;
        lg.games.forEach(g => {
            html += `<div class="match-card"><span class="match-teams">${g.home} vs ${g.away}</span><span class="match-time">${g.time}</span></div>`;
        });
    });
    c.innerHTML = html;
}

function renderStandings() {
    const s = document.getElementById('standingsContainer');
    s.innerHTML = `
        <table class="standings-table">
            <thead><tr><th>#</th><th>الفريق</th><th>ل</th><th>نقاط</th></tr></thead>
            <tbody>
                <tr><td>1</td><td>Liverpool</td><td>30</td><td>71</td></tr>
                <tr><td>2</td><td>Arsenal</td><td>30</td><td>66</td></tr>
                <tr><td>3</td><td>Man City</td><td>30</td><td>59</td></tr>
            </tbody>
        </table>`;
}

function showTab(name, el) {
    document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    el.classList.add('active');
}

function toggleTheme() {
    const body = document.documentElement;
    const isDark = body.getAttribute('data-theme') !== 'light';
    body.setAttribute('data-theme', isDark ? 'light' : '');
    document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
}

window.onload = () => { renderMatches(); renderStandings(); };
</script>
</body>
</html>
