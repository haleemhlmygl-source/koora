<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalZone 2026 - HALEEM HLMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #05070a; color: white; font-family: 'Cairo', sans-serif; text-align: center; padding: 20px; }
        .header { color: #00e676; font-size: 2rem; margin-bottom: 20px; }
        .box { background: #12151a; border-radius: 15px; padding: 15px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { color: #00e676; border-bottom: 2px solid #333; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #222; }
        .footer { margin-top: 20px; color: #666; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="header">⚽ GOALZONE 2026</div>
    <h3 style="color:#ffd700;">ترتيب الدوري الإنجليزي (حقيقي 2026)</h3>

    <div class="box" id="content">
        جاري الاتصال بالسيرفر العالمي... 🔄
    </div>

    <div class="footer">المبرمج: <b>HALEEM HLMY</b> | سوهاج</div>

    <script>
        // مفتاحك اللي شغال 100%
        const TOKEN = "2388962a5e2454c87c909d662a32188";

        async function start() {
            try {
                // طلب مباشر وسريع
                const res = await fetch('https://api.football-data.org/v4/competitions/PL/standings', {
                    headers: { 'X-Auth-Token': TOKEN }
                });
                const data = await res.json();
                
                if (data.standings) {
                    let table = data.standings[0].table;
                    let html = '<table><tr><th>#</th><th>الفريق</th><th>ن</th></tr>';
                    table.slice(0, 10).forEach(t => {
                        html += `<tr><td>${t.position}</td><td style="text-align:right;">${t.team.shortName}</td><td><b>${t.points}</b></td></tr>`;
                    });
                    document.getElementById('content').innerHTML = html + '</table>';
                } else {
                    document.getElementById('content').innerHTML = "السيرفر يطلب الانتظار دقيقة.. جرب تحديث الصفحة بعد قليل.";
                }
            } catch (e) {
                document.getElementById('content').innerHTML = "اضغط تحديث (Refresh) للصفحة مرة أخرى.";
            }
        }
        start();
    </script>
</body>
</html>
