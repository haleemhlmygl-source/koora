<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalZone 2026 - HALEEM HLMY</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/532/532495.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #12151a; --green: #00e676; --gold: #ffd700; --live: #ff3d00; --input: #1a1e24; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; scroll-behavior: smooth; }
        
        /* شريط التنبيه العلوي - تعديل التوقيت هنا */
        .alert-bar { background: var(--live); color: white; text-align: center; font-size: 0.75rem; padding: 8px 0; font-weight: 900; box-shadow: 0 2px 10px rgba(255, 61, 0, 0.4); }
        
        .header-area { padding: 25px 0; text-align: center; }
        .header { color: var(--green); font-size: 2.2rem; font-weight: 900; margin: 0; text-shadow: 0 0 15px rgba(0,230,118,0.2); }

        .ticker-wrap { background: #111; border-bottom: 1px solid #222; height: 40px; overflow: hidden; display: flex; align-items: center; }
        .ticker-label { background: var(--green); color: black; padding: 0 18px; font-weight: 900; font-size: 0.8rem; height: 100%; display: flex; align-items: center; z-index: 2; }
        .ticker-text { white-space: nowrap; padding-right: 100%; animation: ticker 35s linear infinite; font-size: 0.88rem; }
        @keyframes ticker { 0% { transform: translate(0, 0); } 100% { transform: translate(100%, 0); } }

        .content { padding: 15px; }
        .section-title { color: var(--gold); font-size: 1.2rem; margin: 25px 0 15px; border-right: 5px solid var(--green); padding-right: 12px; font-weight: 900; }
        
        .match-box { background: linear-gradient(145deg, #12151a, #0a0c10); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
        .match-info { display: flex; justify-content: space-between; align-items: center; }
        .time { color: var(--green); font-weight: 900; background: rgba(0,230,118,0.1); padding: 5px 12px; border-radius: 10px; font-size: 0.9rem; }
        .pulse { height: 8px; width: 8px; background: var(--live); border-radius: 50%; box-shadow: 0 0 8px var(--live); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        .news-card { background: var(--card); border-radius: 18px; padding: 20px; border: 1px solid #222; margin-bottom: 15px; border-right: 4px solid var(--gold); }
        .news-title { color: #eee; font-size: 0.95rem; text-decoration: none; display: block; font-weight: 700; line-height: 1.6; text-align: left; direction: ltr; }

        .contact-form { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid #222; margin-top: 20px; }
        .contact-form input, .contact-form textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #333; background: var(--input); color: white; font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        .contact-form button { width: 100%; padding: 15px; background: var(--green); color: black; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 1rem; }

        .wa-float { position: fixed; bottom: 25px; left: 20px; background: #25d366; color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 100; text-decoration: none; font-size: 24px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        .footer { text-align: center; color: #444; padding: 40px 20px; font-size: 0.8rem; border-top: 1px solid #111; margin-top: 30px; }
    </style>
</head>
<body>
