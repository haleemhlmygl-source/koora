    <title>GoalZone 2026 - HALEEM HLMY</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root{--bg:#05070a;--bg2:#0d1117;--card:#12151a;--card2:#1a1f28;--green:#00e676;--gold:#ffd700;--live:#ff3d00;--border:#1e2530;--text:#e8eaf0;--text2:#8892a4;--glow:rgba(0,230,118,0.15)}
        [data-theme="light"]{--bg:#f0f4f8;--bg2:#e4eaf2;--card:#fff;--card2:#f7f9fc;--border:#d0dae8;--text:#1a2233;--text2:#5a6a82}
        *{box-sizing:border-box;margin:0;padding:0;transition:background .3s,color .3s}
        body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;overflow-x:hidden}
        .alert-bar{background:linear-gradient(90deg,var(--live),#ff6d00);color:#fff;text-align:center;font-size:.78rem;padding:9px 0;font-weight:900}
        .header-area{padding:24px 16px 16px;text-align:center;background:var(--bg2);border-bottom:1px solid var(--border)}
        .header-top{display:flex;justify-content:flex-end;max-width:640px;margin:0 auto 16px;gap:10px}
        .theme-btn{background:var(--card);border:1px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
        .notif-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:0 14px;height:38px;border-radius:20px;cursor:pointer;font-size:.78rem;font-weight:900;font-family:'Cairo',sans-serif;display:flex;align-items:center;gap:6px}
        .notif-btn.active{background:var(--green);color:#000;border-color:var(--green)}
        .logo-box{display:inline-block;padding:12px 30px;border:2px solid var(--green);border-radius:16px;box-shadow:0 0 30px var(--glow)}
        .logo-main{color:var(--green);font-size:2rem;font-weight:900;font-family:'Orbitron',sans-serif;letter-spacing:2px;text-shadow:0 0 20px var(--green)}
        .logo-sub{color:var(--gold);font-size:.72rem;font-weight:700;display:block;border-top:1px solid var(--border);padding-top:5px;margin-top:5px}
        .ticker-wrap{background:var(--bg2);border-bottom:1px solid var(--border);height:38px;overflow:hidden;display:flex;align-items:center}
        .ticker-label{background:var(--green);color:#000;padding:0 14px;font-weight:900;font-size:.75rem;height:100%;display:flex;align-items:center;flex-shrink:0}
        .ticker-track{overflow:hidden;flex:1}
        .ticker-text{white-space:nowrap;animation:ticker 40s linear infinite;font-size:.8rem;color:var(--text2)}
        @keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(100%)}}
        .search-wrap{max-width:640px;margin:16px auto 0;padding:0 16px}
        .search-box{display:flex;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
        .search-box input{flex:1;background:transparent;border:none;outline:none;padding:13px 16px;font-size:.9rem;color:var(--text);font-family:'Cairo',sans-serif}
        .search-box button{background:var(--green);border:none;padding:0 20px;cursor:pointer;font-size:18px;color:#000}
        .search-results{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-top:8px;overflow:hidden;display:none}
        .search-result-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;font-size:.85rem}
        .tabs-wrap{max-width:640px;margin:14px auto 0;padding:0 16px}
        .tabs{display:flex;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;padding:4px;gap:2px}
        .tab-btn{flex:1;padding:10px 4px;background:transparent;border:none;color:var(--text2);cursor:pointer;font-family:'Cairo',sans-serif;font-size:.78rem;font-weight:700;border-radius:10px;transition:all .2s;white-space:nowrap}
        .tab-btn.active{background:var(--green);color:#000}
        .content{padding:16px;max-width:640px;margin:auto}
        .tab-page{display:none}
        .tab-page.active{display:block}
        .section-title{color:var(--gold);font-size:1rem;margin:20px 0 10px;border-right:4px solid var(--green);padding-right:10px;font-weight:900}
        .league-section{margin-bottom:16px}
        .league-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--card2);border-radius:12px 12px 0 0;border:1px solid var(--border);font-weight:900;font-size:.85rem}
        .match-card{background:var(--card);border:1px solid var(--border);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
