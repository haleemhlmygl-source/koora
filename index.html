<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalZone 2026 - HALEEM HLMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #12151a; --green: #00e676; --gold: #ffd700; --red: #ff4d4d; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* شريط الأخبار اللي اختفى */
        .ticker { background: var(--red); color: #fff; padding: 6px; font-size: 0.8rem; overflow: hidden; white-space: nowrap; border-radius: 8px; margin-bottom: 12px; }
        .ticker span { display: inline-block; padding-left: 100%; animation: ticker 20s linear infinite; font-weight: bold; }
        @keyframes ticker { 0% { transform: translate(0, 0); } 100% { transform: translate(100%, 0); } }

        .header { text-align: center; color: var(--green); font-size: 1.6rem; padding: 10px 0; font-weight: 900; }
        .section-title { background: var(--card); padding: 10px; border-radius: 8px; margin: 15px 0 10px; border-right: 5px solid var(--green); font-weight: 800; font-size: 0.9rem; }
        
        .tabs { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 15px; padding-bottom: 5px; }
        .tab-btn { background: var(--card); border: 1px solid #333; color: #aaa; padding: 8px 15px; border-radius: 20px; white-space: nowrap; cursor: pointer; font-size: 0.8rem; }
        .tab-btn.active { background: var(--green); color: #000; font-weight: bold; }

        .box { background: var(--card); border-radius: 12px; padding: 12px; border: 1px solid #333; margin-bottom: 15px; min-height: 100px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { color: var(--green); padding: 10px 5px; border-bottom: 1px solid #333; }
        td { padding: 12px 5px; border-bottom: 1px solid #222; text-align: center; }

        .footer { text-align: center; color: #666; font-size: 0.7rem; margin-top: 20px; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="ticker">
        <span>📢 حصرياً: تطبيق GoalZone 2026 يغطي كافة الدوريات بأحدث البيانات المباشرة.. أهلاً بك يا مبرمج حليم!</span>
    </div>

    <div class="header">⚽ GOALZONE 2026</div>

    <div class="section-title">📊 اختر الدوري</div>
    <div class="tabs">
        <button class="tab-btn active" onclick="load(39, 'الإنجليزي', this)">🏴󠁧󠁢󠁥󠁮󠁧󠁿 الإنجليزي</button>
        <button class="tab-btn" onclick="load(140, 'الإسباني', this)">🇪🇸 الإسباني</button>
        <button class="tab-btn" onclick="load(307, 'السعودي', this)">🇸🇦 السعودي</button>
        <button class="tab-btn" onclick="load(233, 'المصري', this)">🇪🇬 المصري</button>
    </div>

    <div class="section-title">🏆 جدول الترتيب المباشر</div>
    <div class="box" id="standings-box">
        <p style="text-align:center; color:var(--gold);">جاري الاتصال بالسيرفر العالمي... 🔄</p>
    </div>

    <div class="footer">
        بواسطة المبرمج: <b>HALEEM HLMY</b> <br>
        مكان الإصدار: سوهاج، مصر | 2026
    </div>

    <script>
        const API_KEY = "3233c035c06b5a688ee984abb39f4b67";

        async function load(id, name, btn) {
            if(btn) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            const box = document.getElementById('standings-box');
            box.innerHTML = `<p style="text-align:center;">جاري جلب أحدث بيانات لـ ${name}... 🔄</p>`;

            // هيجرب السنين اللي فيها داتا (2025 هي الأساس في مارس 2026)
            const seasons = [2025, 2024, 2026];
            let success = false;

            for (let s of seasons) {
                try {
                    const res = await fetch(`https://v3.football.api-sports.io/standings?league=${id}&season=${s}`, {
                        "headers": { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
                    });
                    const data = await res.json();
                    
                    if (data.response && data.response[0]) {
                        const st = data.response[0].league.standings[0];
                        let html = '<table><tr><th>#</th><th style="text-align:right;">الفريق</th><th>ن</th></tr>';
                        st.slice(0, 12).forEach(t => {
                            html += `<tr><td>${t.rank}</td><td style="text-align:right;"><img src="${t.team.logo}" width="18"> ${t.team.name}</td><td><b>${t.points}</b></td></tr>`;
                        });
                        box.innerHTML = html + '</table>';
                        success = true;
                        break;
                    }
                } catch (e) {}
            }

            if (!success) {
                box.innerHTML = `<p style="text-align:center; padding:20px;">عفواً، السيرفر لا يستجيب لبيانات ${name} حالياً. جرب دوري آخر.</p>`;
            }
        }

        // تشغيل الدوري الإنجليزي أوتوماتيك
        window.onload = () => load(39, 'الإنجليزي', null);
    </script>
</body>
</html>
