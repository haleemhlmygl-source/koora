<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalZone 2026 - Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #05070a; color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 15px; }
        .header { text-align: center; color: #00e676; font-size: 1.8rem; font-weight: 900; margin-bottom: 20px; }
        .card { background: #12151a; border-radius: 15px; padding: 15px; border: 1px solid #333; margin-bottom: 15px; }
        .team-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; }
        .rank { color: #00e676; font-weight: bold; width: 30px; }
        .team-name { flex-grow: 1; text-align: right; margin-right: 10px; }
        .points { color: #ffd700; font-weight: bold; width: 40px; text-align: center; }
        .tabs { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 20px; }
        .tab { background: #1c1f26; padding: 8px 20px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 0.9rem; border: 1px solid #333; }
        .tab.active { background: #00e676; color: #000; font-weight: bold; }
        img { width: 22px; vertical-align: middle; }
    </style>
</head>
<body>

    <div class="header">⚽ GOALZONE 2026</div>

    <div class="tabs" id="tabs">
        <div class="tab active" onclick="load(39, this)">🏴󠁧󠁢󠁥󠁮󠁧󠁿 إنجلترا</div>
        <div class="tab" onclick="load(140, this)">🇪🇸 إسبانيا</div>
        <div class="tab" onclick="load(307, this)">🇸🇦 السعودية</div>
        <div class="tab" onclick="load(233, this)">🇪🇬 مصر</div>
    </div>

    <div id="content" class="card">
        <p style="text-align:center;">جاري جلب بيانات 2026 الحقيقية... 🔄</p>
    </div>

    <script>
        const K = "3233c035c06b5a688ee984abb39f4b67";

        async function load(id, el) {
            if(el) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                el.classList.add('active');
            }
            const box = document.getElementById('content');
            box.innerHTML = `<p style="text-align:center;">جاري التحديث... 🔄</p>`;

            try {
                // بنطلب موسم 2025 لأنه في عرف البرمجة هو اللي شغال دلوقتي (2025-2026)
                const r = await fetch(`https://v3.football.api-sports.io/standings?league=${id}&season=2025`, {
                    "headers": { "x-rapidapi-key": K, "x-rapidapi-host": "v3.football.api-sports.io" }
                });
                const d = await r.json();
                
                if(d.response && d.response[0]) {
                    const st = d.response[0].league.standings[0];
                    let h = '';
                    st.slice(0, 15).forEach(i => {
                        h += `<div class="team-row">
                                <span class="rank">${i.rank}</span>
                                <span class="team-name"><img src="${i.team.logo}"> ${i.team.name}</span>
                                <span class="points">${i.points}</span>
                              </div>`;
                    });
                    box.innerHTML = h;
                } else {
                    box.innerHTML = `<p style="text-align:center;">السيرفر مكسل.. جرب تضغط تاني كمان شوية</p>`;
                }
            } catch(e) { box.innerHTML = "خطأ في الشبكة"; }
        }
        load(39); // ابدأ بالإنجليزي عشان تضمن إنه شغال
    </script>
</body>
</html>
