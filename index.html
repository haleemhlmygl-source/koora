<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalZone 2026 - HALEEM HLMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #05070a; color: white; font-family: 'Cairo', sans-serif; margin: 0; padding: 15px; }
        .header { color: #00e676; font-size: 2rem; font-weight: 900; text-align: center; margin-bottom: 20px; }
        .news-card { background: #12151a; border-radius: 15px; padding: 15px; border: 1px solid #333; margin-bottom: 15px; animation: fadeIn 0.5s ease; }
        .news-title { color: #ffd700; font-size: 1rem; font-weight: 700; margin-bottom: 8px; display: block; text-decoration: none; }
        .news-date { color: #666; font-size: 0.75rem; }
        .footer { text-align: center; color: #444; font-size: 0.8rem; margin-top: 30px; border-top: 1px solid #222; padding-top: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">⚽ أخبار الكورة الحية</div>
    <div style="text-align:center; color:#888; margin-bottom:20px;">تغطية مباشرة - سوهاج 2026</div>

    <div id="news-container">
        <p style="text-align:center;">جاري جلب أحدث الأخبار العالمية... 🔄</p>
    </div>

    <div class="footer">المبرمج: <b>HALEEM HLMY</b> | جميع الحقوق محفوظة ©</div>

    <script>
        async function fetchNews() {
            try {
                // بنسحب الأخبار من مصدر BBC Sports العالمي (مفتوح ومجاني وسريع)
                const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Ffeeds.bbci.co.uk%2Fsport%2Ffootball%2Frss.xml');
                const data = await res.json();
                
                let html = '';
                data.items.slice(0, 8).forEach(item => {
                    html += `
                    <div class="news-card">
                        <a href="${item.link}" target="_blank" class="news-title">${item.title}</a>
                        <div class="news-date">📅 نُشر في: ${item.pubDate}</div>
                    </div>`;
                });
                document.getElementById('news-container').innerHTML = html;
            } catch (e) {
                document.getElementById('news-container').innerHTML = "حدث خطأ في جلب الأخبار، حاول لاحقاً.";
            }
        }
        fetchNews();
    </script>
</body>
</html>
