<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalZone 2026 - HALEEM HLMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #12151a; --green: #00e676; --gold: #ffd700; --red: #ff4d4d; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        .ticker { background: var(--red); color: #fff; padding: 8px; font-size: 0.85rem; overflow: hidden; white-space: nowrap; border-radius: 10px; margin-bottom: 15px; }
        .ticker span { display: inline-block; padding-left: 100%; animation: ticker 25s linear infinite; font-weight: bold; }
        @keyframes ticker { 0% { transform: translate(0, 0); } 100% { transform: translate(100%, 0); } }
        .header { text-align: center; color: var(--green); font-size: 1.8rem; font-weight: 900; padding: 10px 0; }
        .section-title { background: var(--card); padding: 12px; border-radius: 10px; margin: 20px 0 10px; border-right: 6px solid var(--green); font-weight: 800; font-size: 0.95rem; }
        .live-wrap { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; min-height: 80px; }
        .match-box { background: #1c1f26; min-width: 140px; padding: 10px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        .score { font-size: 1.1rem; font-weight: 900; color: var(--gold); }
        .tabs { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 15px; }
        .tab { background: var(--card); border: 1px solid #444; color: #bbb; padding: 10px 18px; border-radius: 20px; white-space: nowrap; cursor: pointer; font-size: 0.8rem; }
        .tab.active { background: var(--green); color: #000; font-weight: bold; }
        .box { background: var(--card); border-radius: 15px; padding: 12px; border: 1px solid #333; min-height: 200px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        td { padding: 10px 5px; border-bottom: 1px solid #222; text-align: center; }
        .footer { text-align: center; color: #666; font-size: 0.75rem; padding: 20px 0; border-top: 1px solid #222; }
    </style>
</head>
<body>
    <div class="ticker"><span>📢 تغطية حية لنتائج الجمعة 20 مارس 2026 .. تصميم المبرمج حليم حلمي .. تابع ليفربول والأهلي لحظة بلحظة! ⚽</span></div>
    <div class="header">⚽ GOALZONE 2026</div>
    <div class="section-title">⏱️ نتائج مباريات الآن (مباشر)</div>
    <div id="live-matches" class="live-wrap"><p style="padding:10px;">جاري جلب المباريات... 🔄</p></div>
    <div class="section-title">📊 ترتيب الدوريات</div>
    <div class="tabs">
        <button class="tab active" onclick="load(39, 'الإنجليزي', this)">🏴󠁧󠁢󠁥󠁮󠁧󠁿 الإنجليزي</button>
        <button class="tab" onclick="load(307, 'السعودي', this)">🇸🇦 السعودي</button>
        <button class="tab" onclick="load(233, 'المصري', this)">🇪🇬 المصري</button>
    </div>
    <div id="main-content" class="box"><p style="text-align:center; padding:20px;">جاري التحديث... 🔄</p></div>
    <div class="footer">بواسطة: <b>HALEEM HLMY</b> | سوهاج 2026</div>

    <script>
        const API_KEY = "3233c035c06b5a688ee984abb39f4b67";
        const HEADERS = { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" };

        async function updateLive() {
            try {
                const res = await fetch(`https://v3.football.api-sports.io/fixtures?live=all`, { headers: HEADERS });
                const d = await res.json();
                const box = document.getElementById('live-matches');
                if (d.response && d.response.length > 0) {
                    let h = '';
                    d.response.slice(0, 10).forEach(m => {
                        h += `<div class="match-box"><div class="score">${m.goals.home} - ${m.goals.away}</div><div style="font-size:0.65rem;">${m.teams.home.name} vs ${m.teams.away.name}</div></div>`;
                    });
                    box.innerHTML = h;
                } else { box.innerHTML = "<p>لا توجد مباريات جارية حالياً.</p>"; }
            } catch (e) { box.innerHTML = "خطأ في الاتصال بالسيرفر."; }
        }

        async function load(id, name, btn) {
            if(btn) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
            }
            const box = document.getElementById('main-content');
            box.innerHTML = `<p style="text-align:center;">جاري جلب ${name}... 🔄</p>`;
            try {
                // طلب موسم 2024 لضمان وجود بيانات فورية حالاً
                const res = await fetch(`https://v3.football.api-sports.io/standings?league=${id}&season=2024`, { headers: HEADERS });
                const d = await res.json();
                if (d.response && d.response[0]) {
                    const st = d.response[0].league.standings[0];
                    let h = '<table><tr><th>#</th><th>الفريق</th><th>ن</th></tr>';
                    st.slice(0, 10).forEach(i => {
                        h += `<tr><td>${i.rank}</td><td style="text-align:right;"><img src="${i.team.logo}" width="15"> ${i.team.name}</td><td><b>${i.points}</b></td></tr>`;
                    });
                    box.innerHTML = h + '</table>';
                } else { box.innerHTML = "بيانات السيرفر غير متاحة الآن."; }
            } catch (e) { box.innerHTML = "فشل في تحديث البيانات."; }
        }

        window.onload = () => { updateLive(); load(39, 'الإنجليزي', null); };
    </script>
</body>
</html>
