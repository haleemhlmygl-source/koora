<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalZone 2026 - HALEEM HLMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #12151a; --green: #00e676; --gold: #ffd700; --live: #ff3d00; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        
        .alert-bar { background: var(--live); color: white; text-align: center; font-size: 0.8rem; padding: 10px 0; font-weight: 900; }
        .header-area { padding: 25px 0; text-align: center; }
        .header { color: var(--green); font-size: 2.2rem; font-weight: 900; margin: 0; }

        .ticker-wrap { background: #111; border-bottom: 1px solid #222; height: 40px; overflow: hidden; display: flex; align-items: center; }
        .ticker-text { white-space: nowrap; padding-right: 100%; animation: ticker 30s linear infinite; font-size: 0.9rem; color: #eee; }
        @keyframes ticker { 0% { transform: translate(0, 0); } 100% { transform: translate(100%, 0); } }

        .content { padding: 15px; max-width: 600px; margin: auto; }
        .section-title { color: var(--gold); font-size: 1.1rem; margin: 25px 0 15px; border-right: 5px solid var(--green); padding-right: 12px; font-weight: 900; text-align: right; }
        
        .match-box { background: var(--card); border-radius: 15px; padding: 18px; margin-bottom: 12px; border: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .time { color: var(--green); font-weight: 900; background: rgba(0,230,118,0.1); padding: 5px 12px; border-radius: 8px; font-size: 0.9rem; }

        /* كروت الأخبار من المصدر */
        .news-card { background: var(--card); border-radius: 15px; padding: 18px; border: 1px solid #222; margin-bottom: 12px; border-right: 4px solid var(--gold); text-align: left; direction: ltr; }
        .news-title { color: #eee; font-size: 0.9rem; text-decoration: none; font-weight: bold; line-height: 1.5; display: block; }

        .footer { text-align: center; color: #444; padding: 40px 20px; font-size: 0.8rem; }
    </style>
</head>
