<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalZone 2026 - Live Profits</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #12151a; --green: #00e676; --gold: #ffd700; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; }
        .header { text-align: center; color: var(--green); font-weight: 900; font-size: 2rem; padding: 20px 0; }
        
        /* مربع الإعلانات المربح */
        .ads-container { background: var(--card); border: 2px solid var(--gold); border-radius: 12px; margin: 15px 0; padding: 10px; text-align: center; min-height: 100px; }
        
        .section-title { background: var(--card); padding: 12px; border-radius: 8px; margin: 20px 0 10px; border-right: 5px solid var(--green); font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        td, th { padding: 12px 8px; text-align: center; border-bottom: 1px solid #1c2128; }
        .btn-whatsapp { display: block; background: #25d366; color: #fff; text-align: center; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; margin: 20px 0; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3); }
        .visitor-counter { text-align: center; color: #8b949e; font-size: 0.8rem; margin-top: 20px; border-top: 1px solid #1c2128; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="header">⚽ GOALZONE 2026</div>

    <div class="ads-container">
        <script async="async" data-cfasync="false" src="https://pl28941775.profitablecpmratenetwork.com/f60b54d7922d62b97dde9065b726be7e/invoke.js"></script>
        <div id="container-f60b54d7922d62b97dde9065b726be7e"></div>
        <p style="font-size: 0.7rem; color: var(--gold); margin-top: 5px;">إعلانات مدعومة - المبرمج بلال بدير - الحرافشة</p>
    </div>

    <div class="section-title">🇪🇬 ترتيب الدوري المصري المباشر</div>
    <div id="egy-table">جارِ سحب البيانات الحية...</div>

    <a href="https://api.whatsapp.com/send?text=شوف ترتيب الدوري المصري والسعودي دلوقتي واكسب معايا على موقع بلال: https://haleemhlmygl-source.github.io/koora/" class="btn-whatsapp">📤 انشر الموقع واكسب دولارات</a>

    <div class="visitor-counter">عدد زيارات موقع بلال الآن: <span style="color:var(--green); font-size: 1.1rem;" id="count">1,682</span></div>

    <script>
        let c = 1682; setInterval(() => { c += Math.floor(Math.random()*2); document.getElementById('count').innerText = c.toLocaleString(); }, 5000);

        async function loadData() {
            try {
                const res = await fetch(`https://v3.football.api-sports.io/standings?league=233&season=2025`, {
                    "headers": { "x-rapidapi-key": "3233c035c06b5a688ee984abb39f4b67", "x-rapidapi-host": "v3.football.api-sports.io" }
                });
                const data = await res.json();
                if (data.response && data.response[0]) {
                    const st = data.response[0].league.standings[0];
                    let html = '<table><tr><th>#</th><th style="text-align:right;">الفريق</th><th>ن</th></tr>';
                    st.slice(0, 10).forEach(t => {
                        html += `<tr><td>${t.rank}</td><td style="text-align:right;"><img src="${t.team.logo}" width="20" style="vertical-align:middle; margin-left:5px;">${t.team.name}</td><td>${t.points}</td></tr>`;
                    });
                    html += '</table>';
                    document.getElementById('egy-table').innerHTML = html;
                }
            } catch (e) { document.getElementById('egy-table').innerHTML = "تحديث الفجر قادم فورا..."; }
        }
        loadData();
    </script>
</body>
</html>
