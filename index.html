    <style>
        :root { --bg: #05070a; --card: #12151a; --green: #00e676; --gold: #ffd700; --red: #ff4d4d; --blue: #1877f2; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; }
        .header { text-align: center; color: var(--green); font-size: 1.6rem; padding: 15px 0; font-weight: 900; }
        
        /* شريط الأخبار العاجلة */
        .news-ticker { background: var(--red); color: #fff; padding: 6px; font-size: 0.85rem; overflow: hidden; white-space: nowrap; border-radius: 8px; margin-bottom: 12px; }
        .news-ticker span { display: inline-block; padding-left: 100%; animation: ticker 20s linear infinite; font-weight: bold; }
        @keyframes ticker { 0% { transform: translate(0, 0); } 100% { transform: translate(100%, 0); } }

        .section-title { background: var(--card); padding: 10px; border-radius: 8px; margin: 15px 0 10px; border-right: 5px solid var(--green); font-weight: 800; font-size: 0.9rem; }
        
        /* قسم التصويت التفاعلي */
        .vote-container { background: var(--card); border-radius: 15px; padding: 15px; border: 1px dashed #444; text-align: center; margin: 15px 0; }
        .vote-btns { display: flex; justify-content: space-around; gap: 10px; margin-top: 10px; }
        .v-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: #fff; transition: 0.3s; }
        .v-ahly { background: #cc0000; box-shadow: 0 4px 10px rgba(204, 0, 0, 0.2); }
        .v-zamalek { background: #fff; color: #000; box-shadow: 0 4px 10px rgba(255, 255, 255, 0.1); }

        /* قسم الترتيب المباشر */
        .table-container { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #2d333b; min-height: 80px; }
        
        /* أزرار المشاركة */
        .btn-share { display: flex; align-items: center; justify-content: center; padding: 12px; border-radius: 12px; text-decoration: none; font-weight: bold; color: #fff; font-size: 0.9rem; }
        .wa { background: #25d366; }
        .fb { background: var(--blue); }

        /* تنسيق الإعلان الصغير في الأسفل */
        .ads-bottom { 
            background: var(--card); 
            border: 1px solid #2d333b; 
            border-radius: 12px; 
            margin: 20px auto 10px; 
            padding: 5px; 
            max-width: 330px; 
            max-height: 110px; 
            overflow: hidden; 
            text-align: center;
        }

        .footer { text-align: center; color: #8b949e; font-size: 0.75rem; margin-top: 25px; border-top: 1px solid #222; padding: 15px 0; }
        #live-clock { color: var(--gold); font-weight: bold; display: block; margin-top: 5px; }
    </style>
</head>
