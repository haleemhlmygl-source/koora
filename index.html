<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalZone 2026 - HALEEM HLMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #12151a; --green: #00e676; --gold: #ffd700; --red: #ff4d4d; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }

        .news-ticker { background: var(--red); color: #fff; padding: 8px 0; font-size: 0.85rem; overflow: hidden; white-space: nowrap; border-radius: 10px; margin-bottom: 15px; }
        .news-ticker span { display: inline-block; animation: ticker 30s linear infinite; font-weight: bold; padding-right: 100vw; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .header { text-align: center; color: var(--green); font-size: 1.8rem; font-weight: 900; padding: 10px 0; text-shadow: 0 0 10px rgba(0,230,118,0.3); }

        .section-title { background: var(--card); padding: 12px; border-radius: 10px; margin: 20px 0 10px; border-right: 6px solid var(--green); font-weight: 800; font-size: 1rem; color: var(--green); }

        .tabs { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 15px; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { background: var(--card); border: 1px solid #444; color: #bbb; padding: 10px 16px; border-radius: 20px; white-space: nowrap; cursor: pointer; font-weight: bold; font-size: 0.82rem; font-family: 'Cairo', sans-serif; transition: all 0.2s; }
        .tab-btn.active { background: var(--green); color: #000; border-color: var(--green); }

        .widget-box { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #222; margin-bottom: 15px; }

        /* تخصيص شكل الـ widgets */
        .livescore-widget { width: 100%; min-height: 300px; }
        iframe { border: none; width: 100%; }

        .footer { text-align: center; color: #555; font-size: 0.78rem; padding: 20px 0; border-top: 1px solid #1a1a1a; line-height: 1.8; margin-top: 10px; }
    </style>
</head>
<body>

<div class="news-ticker">
    <span>📢 GoalZone 2026 — نتائج ومباريات حقيقية مباشرة .. برعاية المبرمج حليم حلمي 🌟</span>
</div>

<div class="header">⚽ GOALZONE 2026</div>

<!-- ── نتائج مباشرة (widget من livescore-widget.com) ── -->
<div class="section-title">⏱️ نتائج مباشرة الآن</div>
<div class="widget-box">
    <iframe
        src="https://www.livescore-widget.com/widget/livescores/?lang=ar&theme=dark&bg=121518&text=ffffff&live=true"
        style="width:100%; height:400px; border:none;"
        scrolling="no"
        title="Live Scores">
    </iframe>
</div>

<!-- ── ترتيب الدوريات ── -->
<div class="section-title">📊 ترتيب الدوريات</div>
<div class="tabs">
    <button class="tab-btn active"  onclick="showLeague('pl')">🏴󠁧󠁢󠁥󠁮󠁧󠁿 الإنجليزي</button>
    <button class="tab-btn" onclick="showLeague('laliga')">🇪🇸 الإسباني</button>
    <button class="tab-btn" onclick="showLeague('seriea')">🇮🇹 الإيطالي</button>
    <button class="tab-btn" onclick="showLeague('bl')">🇩🇪 الألماني</button>
    <button class="tab-btn" onclick="showLeague('ligue1')">🇫🇷 الفرنسي</button>
    <button class="tab-btn" onclick="showLeague('saudi')">🇸🇦 السعودي</button>
    <button class="tab-btn" onclick="showLeague('egypt')">🇪🇬 المصري</button>
</div>

<div class="widget-box" id="standing-widget">
    <iframe id="stand-iframe"
        src="https://www.scoreboard.com/en/standings/soccer/england/premier-league-2024-2025/table/overall/#standings;tournament:SBy4bkPr"
        style="width:100%; height:500px; border:none;"
        title="Standings">
    </iframe>
</div>

<div class="footer">
    بواسطة المبرمج: <b>HALEEM HLMY</b><br>
    مكان الإصدار: الحرافشة - سوهاج | مارس 2026<br>
    جميع الحقوق محفوظة ©
</div>

<script>
// روابط الترتيب لكل دوري من sofascore widget
var LEAGUES = {
    pl:     "https://www.sofascore.com/tournament/football/england/premier-league/17/standings/tables#id:17",
    laliga: "https://www.sofascore.com/tournament/football/spain/laliga/8/standings/tables#id:8",
    seriea: "https://www.sofascore.com/tournament/football/italy/serie-a/23/standings/tables#id:23",
    bl:     "https://www.sofascore.com/tournament/football/germany/bundesliga/35/standings/tables#id:35",
    ligue1: "https://www.sofascore.com/tournament/football/france/ligue-1/34/standings/tables#id:34",
    saudi:  "https://www.sofascore.com/tournament/football/saudi-arabia/saudi-professional-league/955/standings/tables#id:955",
    egypt:  "https://www.sofascore.com/tournament/football/egypt/premier-league/602/standings/tables#id:602",
};

// Widgets من livescores.com (بتدعم embed)
var STAND_WIDGETS = {
    pl:     "https://www.livescores.com/soccer/england/premier-league/standings/?embed=true",
    laliga: "https://www.livescores.com/soccer/spain/laliga/standings/?embed=true",
    seriea: "https://www.livescores.com/soccer/italy/serie-a/standings/?embed=true",
    bl:     "https://www.livescores.com/soccer/germany/bundesliga/standings/?embed=true",
    ligue1: "https://www.livescores.com/soccer/france/ligue-1/standings/?embed=true",
    saudi:  "https://www.livescores.com/soccer/saudi-arabia/saudi-pro-league/standings/?embed=true",
    egypt:  "https://www.livescores.com/soccer/egypt/premier-league/standings/?embed=true",
};

function showLeague(key) {
    // تفعيل الزر
    document.querySelectorAll(".tab-btn").forEach(function(b){ b.classList.remove("active"); });
    event.target.classList.add("active");

    // تغيير الـ iframe
    var iframe = document.getElementById("stand-iframe");
    iframe.src = STAND_WIDGETS[key] || STAND_WIDGETS["pl"];
}
</script>
</body>
</html>
