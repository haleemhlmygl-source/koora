<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalZone 2026 - Earn</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #12151a; --green: #00e676; --gold: #ffd700; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; }
        .ad-container { background: linear-gradient(45deg, #1c2128, #2d333b); border: 2px dashed var(--gold); border-radius: 12px; padding: 20px; margin: 15px 0; text-align: center; }
        .header { text-align: center; color: var(--green); font-weight: 900; font-size: 1.8rem; padding: 20px; }
        .section-title { background: var(--card); padding: 10px; border-radius: 8px; margin: 20px 0 10px; border-right: 5px solid var(--green); font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        td, th { padding: 12px 8px; text-align: center; border-bottom: 1px solid #1c2128; }
        .team-logo { width: 25px; height: 25px; vertical-align: middle; background: #fff; border-radius: 50%; padding: 2px; }
    </style>
</head>
<body>
    <div class="header">⚽ GOALZONE 2026</div>
    <div class="ad-container">
        <div style="color:var(--gold); font-weight:bold;">📢 مساحة إعلانية متوفرة</div>
        <div style="font-size: 0.7rem; color: #8b949e;">للإعلان تواصل معنا: الحرافشة - سوهاج</div>
    </div>
    <div class="section-title">🇪🇬 ترتيب الدوري المصري</div>
    <div id="egy-table">جارِ سحب الترتيب...</div>
    <script>
        const apiKey = "3233c035c06b5a688ee984abb39f4b67";
        async function loadStandings(leagueId, elementId) {
            try {
                const res = await fetch(`https://v3.football.api-sports.io/standings?league=${leagueId}&season=2025`, {
                    "headers": { "x-rapidapi-key": apiKey, "x-rapidapi-host": "v3.football.api-sports.io" }
                });
                const data = await res.json();
                if (data.response && data.response[0]) {
                    const standings = data.response[0].league.standings[0];
                    let html = '<table>';
                    standings.slice(0, 10).forEach(team => {
                        html += `<tr><td>${team.rank}</td><td style="text-align:right;"><img class="team-logo" src="${team.team.logo}">${team.team.name}</td><td>${team.points}</td></tr>`;
                    });
                    html += '</table>';
                    document.getElementById(elementId).innerHTML = html;
                }
            } catch (e) { document.getElementById(elementId).innerHTML = "تحديث حي قادم..."; }
        }
        loadStandings(233, 'egy-table');
    </script>
</body>
</html>
