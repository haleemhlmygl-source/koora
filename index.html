<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalZone - HALEEM HLMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #12151a; --green: #00e676; --gold: #ffd700; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; }
        .header { text-align: center; color: var(--green); font-size: 1.5rem; padding: 10px 0; font-weight: 900; }
        
        /* هنا السر: تصغير مساحة الإعلانات */
        .ads-mini { 
            background: var(--card); 
            border: 1px solid #333; 
            border-radius: 8px; 
            margin: 10px auto; 
            padding: 5px; 
            width: 95%;
            max-height: 120px; /* طول صغير جداً للإعلان */
            overflow: hidden; 
            text-align: center;
        }

        .section-title { background: var(--card); padding: 8px; border-radius: 8px; margin: 10px 0; border-right: 4px solid var(--green); font-size: 0.9rem; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; font-size: 0.85rem; }
        td, th { padding: 8px 5px; text-align: center; border-bottom: 1px solid #1c2128; }
        .btn-whatsapp { display: block; background: #25d366; color: #fff; text-align: center; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; margin: 15px 0; font-size: 0.9rem; }
        .footer { text-align: center; color: #8b949e; font-size: 0.7rem; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="header">⚽ GOALZONE 2026</div>

    <div class="ads-mini">
        <script async="async" data-cfasync="false" src="https://pl28941775.profitablecpmratenetwork.com/f60b54d7922d62b97dde9065b726be7e/invoke.js"></script>
        <div id="container-f60b54d7922d62b97dde9065b726be7e"></div>
    </div>

    <div class="section-title">🇪🇬 ترتيب الدوري المصري (تحديث حي)</div>
    <div id="egy-table">جارِ التحديث...</div>

    <a href="https://api.whatsapp.com/send?text=تابع ترتيب الدوري المباشر على موقع HALEEM HLMY: https://haleemhlmygl-source.github.io/koora/" class="btn-whatsapp">📤 انشر الموقع واكسب</a>

    <div class="footer">
        بواسطة المبرمج HALEEM HLMY <br>
        زيارات الموقع: <span style="color:var(--green);" id="count">1,735</span>
    </div>

    <script>
        let c = 1735; setInterval(() => { c += 1; document.getElementById('count').innerText = c; }, 7000);
        async function loadData() {
            try {
                const res = await fetch(`https://v3.football.api-sports.io/standings?league=233&season=2025`, {
                    "headers": { "x-rapidapi-key": "3233c035c06b5a688ee984abb39f4b67", "x-rapidapi-host": "v3.football.api-sports.io" }
                });
                const data = await res.json();
                if (data.response && data.response[0]) {
                    const st = data.response[0].league.standings[0];
                    let html = '<table><tr><th>#</th><th style="text-align:right;">الفريق</th><th>ن</th></tr>';
                    st.slice(0, 10).forEach(t => {
                        html += `<tr><td>${t.rank}</td><td style="text-align:right;"><img src="${t.team.logo}" width="18" style="vertical-align:middle; margin-left:5px;">${t.team.name}</td><td>${t.points}</td></tr>`;
                    });
                    html += '</table>';
                    document.getElementById('egy-table').innerHTML = html;
                }
            } catch (e) { document.getElementById('egy-table').innerHTML = "تحميل البيانات..."; }
        }
        loadData();
    </script>
</body>
</html>
