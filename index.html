<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalZone 2026 - مباشر الآن</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #05070a; color: #fff; font-family: 'Cairo', sans-serif; padding: 15px; }
        .header { text-align: center; color: #00e676; font-size: 1.5rem; font-weight: 900; margin-bottom: 20px; }
        .match-card { background: #12151a; border-radius: 12px; padding: 15px; border: 1px solid #333; margin-bottom: 10px; display: flex; justify-content: space-around; align-items: center; }
        .team { text-align: center; width: 35%; font-size: 0.9rem; }
        .score { font-size: 1.5rem; font-weight: 900; color: #ffd700; background: #1c1f26; padding: 5px 15px; border-radius: 8px; }
        .live-tag { background: red; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
        img { width: 30px; display: block; margin: 0 auto 5px; }
    </style>
</head>
<body>

    <div class="header">⚽ نتائج مباشرة (الآن 2026)</div>
    <div id="live-matches">
        <p style="text-align:center;">جاري البحث عن مباريات جارية حالياً... 🔄</p>
    </div>

    <script>
        const API_KEY = "3233c035c06b5a688ee984abb39f4b67";

        async function getLive() {
            try {
                // طلب المباريات اللي شغالة "Live" دلوقتي حالاً
                const res = await fetch(`https://v3.football.api-sports.io/fixtures?live=all`, {
                    "headers": { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
                });
                const data = await res.json();
                const container = document.getElementById('live-matches');
                
                if (data.response && data.response.length > 0) {
                    let html = '';
                    data.response.slice(0, 10).forEach(m => {
                        html += `
                        <div class="match-card">
                            <div class="team"><img src="${m.teams.home.logo}"> ${m.teams.home.name}</div>
                            <div style="text-align:center">
                                <span class="live-tag">${m.fixture.status.elapsed}'</span>
                                <div class="score">${m.goals.home} - ${m.goals.away}</div>
                            </div>
                            <div class="team"><img src="${m.teams.away.logo}"> ${m.teams.away.name}</div>
                        </div>`;
                    });
                    container.innerHTML = html;
                } else {
                    container.innerHTML = `<p style="text-align:center;">لا توجد مباريات جارية في هذه اللحظة. جرب وقت المباريات المسائية.</p>`;
                }
            } catch (e) { container.innerHTML = "خطأ في الاتصال"; }
        }
        getLive();
        setInterval(getLive, 60000); // تحديث كل دقيقة أوتوماتيك
    </script>
</body>
</html>
