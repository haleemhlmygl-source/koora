<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalZone 2026 - HALEEM HLMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #12151a; --green: #00e676; --gold: #ffd700; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; }
        .header { text-align: center; color: var(--green); font-size: 1.6rem; padding: 15px; font-weight: 900; }
        .tabs-container { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 15px; padding-bottom: 5px; }
        .tab-btn { background: var(--card); border: 1px solid #333; color: #aaa; padding: 10px 20px; border-radius: 25px; white-space: nowrap; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--green); color: #000; border-color: var(--green); }
        .box { background: var(--card); border-radius: 15px; padding: 15px; border: 1px solid #333; min-height: 200px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { color: var(--green); padding: 10px; border-bottom: 2px solid #333; text-align: center; }
        td { padding: 12px 5px; border-bottom: 1px solid #222; text-align: center; font-size: 0.9rem; }
        .footer { text-align: center; color: #666; font-size: 0.75rem; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="header">⚽ GOALZONE 2026</div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="loadLeague(39, 'الإنجليزي', this)">🏴󠁧󠁢󠁥󠁮󠁧󠁿 الإنجليزي</button>
        <button class="tab-btn" onclick="loadLeague(140, 'الإسباني', this)">🇪🇸 الإسباني</button>
        <button class="tab-btn" onclick="loadLeague(307, 'السعودي', this)">🇸🇦 السعودي</button>
        <button class="tab-btn" onclick="loadLeague(233, 'المصري', this)">🇪🇬 المصري</button>
    </div>

    <div class="box" id="league-content">
        <p style="text-align:center; color:var(--gold);">جاري جلب أحدث ترتيب لعام 2026... 🔄</p>
    </div>

    <div class="footer">المبرمج: <b>HALEEM HLMY</b></div>

    <script>
        // مفتاحك الشخصي الشغال
        const API_KEY = "3233c035c06b5a688ee984abb39f4b67"; 

        async function loadLeague(id, name, btn) {
            if(btn) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            const container = document.getElementById('league-content');
            container.innerHTML = `<p style="text-align:center;">جاري تحديث بيانات ${name} المباشرة... 🔄</p>`;

            try {
                // طلب موسم 2025 (لأنه الموسم الجاري حالياً في مارس 2026)
                const response = await fetch(`https://v3.football.api-sports.io/standings?league=${id}&season=2025`, {
                    "method": "GET",
                    "headers": {
                        "x-rapidapi-key": API_KEY,
                        "x-rapidapi-host": "v3.football.api-sports.io"
                    }
                });

                const result = await response.json();

                if (result.response && result.response.length > 0) {
                    const standings = result.response[0].league.standings[0];
                    let html = '<table><tr><th>#</th><th style="text-align:right;">الفريق</th><th>ن</th></tr>';
                    
                    standings.slice(0, 10).forEach(item => {
                        html += `<tr>
                            <td>${item.rank}</td>
                            <td style="text-align:right;"><img src="${item.team.logo}" width="20" style="vertical-align:middle; margin-left:5px;"> ${item.team.name}</td>
                            <td><b>${item.points}</b></td>
                        </tr>`;
                    });
                    
                    container.innerHTML = html + '</table>';
                } else {
                    container.innerHTML = `<p style="text-align:center; padding:20px;">البيانات لهذا الموسم لم تكتمل بعد في السيرفر.</p>`;
                }
            } catch (error) {
                container.innerHTML = `<p style="text-align:center; color:red; padding:20px;">خطأ في الاتصال. تأكد من الإنترنت.</p>`;
            }
        }

        // تشغيل الدوري الإنجليزي فوراً للتأكد من البيانات الجديدة
        window.onload = () => loadLeague(39, 'الإنجليزي', null);
    </script>
</body>
</html>
